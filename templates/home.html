{% extends "base.html" %}

{% block body %}

<div class="d-flex">

    <!-- YOUR SIDEBAR (UNCHANGED EXACTLY) -->
    <div class="d-flex flex-column flex-shrink-0 p-3 bg-body-tertiary"
         style="width: 280px; height:800px; background-color:#2C5EAD !important">

        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <svg class="bi pe-none me-2" width="40" height="32" aria-hidden="true">
                <use xlink:href="#bootstrap"></use>
            </svg>
            <span class="fs-4">Sidebar</span>
        </a>

        <hr>

        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#" class="nav-link active" aria-current="page">
                    <svg class="bi pe-none me-2" width="16" height="16" aria-hidden="true">
                        <use xlink:href="#home"></use>
                    </svg>
                    Home
                </a>
            </li>
        </ul>

        <hr>

        <div class="dropdown">
            <a href="#" class="d-flex align-items-center link-body-emphasis text-decoration-none dropdown-toggle"
               data-bs-toggle="dropdown" aria-expanded="false">
                <img src="https://github.com/mdo.png" alt="" width="32" height="32"
                     class="rounded-circle me-2">
                <strong>mdo</strong>
            </a>

            <ul class="dropdown-menu text-small shadow">
                <li><a class="dropdown-item" href="#">New project...</a></li>
                <li><a class="dropdown-item" href="#">Settings</a></li>
                <li><a class="dropdown-item" href="#">Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Sign out</a></li>
            </ul>
        </div>

    </div>

    <!-- NOTES AREA -->
    <div class="flex-grow-1 p-3">

        <div class="row">

            <!-- ➕ ADD NOTE BOX -->
            <div class="col-md-6 mb-3">
                <div class="card p-3 h-100">

                    <form method="POST">
                        <input class="form-control mb-2" name="title" placeholder="New note title">
                        <textarea class="form-control mb-2" name="note" placeholder="Write note..."></textarea>

                        <button class="btn btn-primary w-100">Add Note</button>
                    </form>

                </div>
            </div>

            <!-- NOTES -->
            {% for note in note %}
            <div class="col-md-6 mb-3">
                <div class="card p-3 h-100">

                    <div class="d-flex justify-content-between">

                        <div>
                            <h5>{{ note.title }}</h5>
                            <p>{{ note.note }}</p>
                        </div>

                        <small class="text-muted">
                            {{ note.created_at.strftime('%d-%m-%Y %H:%M') }}
                        </small>

                    </div>

                    <a href="/delete/{{ note.id }}" class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </div>
            </div>
            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
